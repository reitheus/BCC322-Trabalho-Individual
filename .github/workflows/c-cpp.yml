name: C/C++ CI

on:
  push:
    branches:
      - master
      - develop
      - staging
      - feature/**
  
  pull_request:
    branches:
      - master
      - develop
      - staging

jobs:

  # =========================
  # BUILD
  # =========================

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build project
      run: make

  # =========================
  # TEST
  # =========================

  test:

    needs: build

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run functional tests
      run: make functional_tests

  # =========================
  # STAGING DEPLOY
  # =========================

  deploy-staging:

    if: github.ref == 'refs/heads/staging'

    needs: test

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Staging deploy
      run: echo "Deploy realizado em staging"

  # =========================
  # PRODUCTION DEPLOY
  # =========================

  deploy-production:

    if: github.ref == 'refs/heads/master'

    needs: test

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Production deploy
      run: echo "Deploy realizado em produção"
